<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>우리 데이트 확인 💌</title>

<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(135deg,#ffe0ec,#e0f7ff);
}

.card {
  background:white;
  width:340px;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.step { display:none; }
.step.active { display:block; }

button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}

.pink { background:#ff5c8a; color:white; }
.gray { background:#ddd; }

#trick {
  position:relative;
}

select {
  width:90%;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
  margin:8px 0;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

  <!-- STEP 1 -->
  <div class="step active" id="s1">
    <h2>💌 오늘 데이트 확인</h2>
    <p>우리 오늘 만나는 거 맞지?</p>
    <button class="pink" onclick="next(2)">당연하지</button>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="s2">
    <h3>오늘 분위기 선택</h3>
    <select id="mood">
      <option>달달 모드 💕</option>
      <option>장난 모드 😏</option>
      <option>귀찮은데 너라서 감 😌</option>
    </select>
    <button class="pink" onclick="next(3)">다음</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="s3">
    <h3>오늘 플랜 고르기</h3>
    <select id="plan">
      <option value="movie">만화카페 🎬</option>
      <option value="cafe">내 방 ☕</option>
      <option value="walk">산책 🚶</option>
    </select>
    <button class="pink" onclick="next(4)">확정</button>
  </div>

  <!-- STEP 4 (장난 구간) -->
  <div class="step" id="s4">
    <h3>마지막 확인</h3>
    <p>나랑 오늘 같이 있는 거 좋지?</p>

    <button class="pink" onclick="final()">응 😏</button>
    <button class="gray" id="trick" onmouseover="run()">잠깐 고민</button>
  </div>

  <!-- STEP 5 -->
  <div class="step" id="s5">
    <h2>💖 오늘 확정</h2>
    <p id="result"></p>
  </div>

</div>

<script>

function next(n){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
}

function run(){
  let b = document.getElementById("trick");
  b.style.position="absolute";
  b.style.left=Math.random()*200+"px";
  b.style.top=Math.random()*80+"px";
}

function final(){
  let mood = document.getElementById("mood").value;
  let plan = document.getElementById("plan").value;

  let planText =
    plan==="movie"?"영화관 🎬":
    plan==="cafe"?"카페 ☕":"산책 🚶";

  let msg = "";

  if(mood.includes("달달")){
    msg = "오늘은 그냥… 우리 둘만 잘 놀자 💕";
  } else if(mood.includes("장난")){
    msg = "오늘 너 놀리면서 하루 다 쓸 예정 😏";
  } else {
    msg = "귀찮아도 결국 너 만나면 괜찮아지더라.";
  }

  document.getElementById("result").innerText =
    "📍 오늘 계획: " + planText + "\n\n" +
    msg + "\n\n" +
    "결론: 오늘 데이트는 이미 확정이야.";
  
  next(5);
}

</script>

</body>
</html>
